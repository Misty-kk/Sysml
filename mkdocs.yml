site_name: SysML DocGen 用户手册
site_description: 基于 SysML 模型的文档自动生成系统
site_author: MBSE 课程设计组
repo_url: https://github.com/libraa-a/sysml2
repo_name: sysml2

theme:
  name: material
  language: zh
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 切换暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 切换亮色模式
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search:
      lang: zh

nav:
  - 首页: index.md
  - 用户手册: user-manual.md
  - 开发文档:
      - API 文档: api.md
      - MDK 集成: mdk.md
      - 后端架构: backend-refactor-notes.md
      - 课设报告: course-design-report.md

extra:
  social:
    - icon: simple/github
      link: https://github.com/libraa-a/sysml2
